name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_ENV: local
  JWT_SECRET: test-secret-test-secret-test-secret
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_USER: app
  POSTGRES_PASSWORD: app
  POSTGRES_DB: app
  REDIS_URL: redis://localhost:6379/0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install uv
        run: pip install uv
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
      - name: Install
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
      - run: uv sync --all-extras
      - run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
      - run: uv sync --all-extras
      - name: Wait for services
        run: |
          until pg_isready -h localhost -U app -d app; do sleep 1; done
          until redis-cli -h localhost ping | grep -q PONG; do sleep 1; done
      - name: Migrate
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        run: |
          uv run alembic upgrade head
      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest -q --maxfail=1
