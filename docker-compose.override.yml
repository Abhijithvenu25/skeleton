# Local-dev overrides. Merged automatically by `docker compose up`.
services:
  app:
    command:
      - sh
      - -c
      - |
        alembic upgrade head &&
        exec uvicorn app.asgi:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: local
      LOG_LEVEL: DEBUG

    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./scripts:/app/scripts
      - ./.env.local:/app/.env.local
