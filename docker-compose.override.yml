# Local-dev overrides. Merged automatically by `docker compose up`.
services:
  app:
    command:
      - sh
      - -c
      - |
        alembic upgrade head &&
        exec uvicorn app.asgi:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: local
      LOG_LEVEL: DEBUG
      # Surface S3 vars to the app container. The app reads these via
      # pydantic-settings (.env.local), but in the docker flow it's cleanest
      # to inject them as the container environment directly so the
      # container's `app` process picks them up without needing .env.local
      # baked into the image.
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: kalisia-uploads
      S3_ACCESS_KEY_ID: kalisia
      S3_SECRET_ACCESS_KEY: kalisia123
      S3_PUBLIC_BASE_URL: http://localhost:9000/kalisia-uploads
      S3_PRESIGNED_TTL_SECONDS: "3600"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./scripts:/app/scripts
