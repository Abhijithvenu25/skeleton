name: kalisia

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [appnet]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [appnet]

  minio:
    # S3-compatible object storage for local dev. The `app` service does NOT
    # depend_on minio (warn-and-continue on boot) — see app/main.py lifespan.
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kalisia}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kalisia123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API (also what the browser hits via public_base_url)
      - "9001:9001"   # web console
    healthcheck:
      # MinIO serves a tiny liveness JSON on the API port. curl is in the
      # base minio image.
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [appnet]

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: kalisia-backend:dev
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_SSL:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    networks: [appnet]

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  appnet:
    driver: bridge
